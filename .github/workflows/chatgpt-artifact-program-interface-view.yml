name: ChatGPT Program Interface Resource View Artifact

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reconstruct and apply patch
        id: apply
        shell: pwsh
        continue-on-error: true
        run: |
          $diagnostic = Join-Path $env:RUNNER_TEMP "apply-diagnostic.txt"
          try {
            $chunks = Get-ChildItem ".chatgpt-artifact/apply.ps1.gz.b64.*" | Sort-Object Name
            $base64 = ($chunks | ForEach-Object { Get-Content -LiteralPath $_.FullName -Raw }) -join ""
            $gzipPath = Join-Path $env:RUNNER_TEMP "apply.ps1.gz"
            $scriptPath = Join-Path $env:RUNNER_TEMP "apply.ps1"
            [IO.File]::WriteAllBytes($gzipPath, [Convert]::FromBase64String($base64))
            "gzip_sha256=$((Get-FileHash -Algorithm SHA256 $gzipPath).Hash)" | Out-File $diagnostic
            $input = [IO.File]::OpenRead($gzipPath)
            try {
              $gzip = [IO.Compression.GZipStream]::new($input, [IO.Compression.CompressionMode]::Decompress)
              try {
                $output = [IO.File]::Create($scriptPath)
                try { $gzip.CopyTo($output) } finally { $output.Dispose() }
              } finally { $gzip.Dispose() }
            } finally { $input.Dispose() }
            $script = [IO.File]::ReadAllText($scriptPath)
            $sectionStart = $script.IndexOf("# 07_D3D12Backend/D3D12Backend.cpp")
            $sectionEnd = $script.IndexOf("# 08_ClassicalRasterFrontend/ClassicalLowering.cpp", $sectionStart)
            if ($sectionStart -lt 0 -or $sectionEnd -lt 0) {
              throw "Could not locate D3D12 backend patch section."
            }
            $prefix = $script.Substring(0, $sectionStart)
            $section = $script.Substring($sectionStart, $sectionEnd - $sectionStart)
            $suffix = $script.Substring($sectionEnd)
            $section = $section.Replace(
              'Replace-Exact "07_D3D12Backend/D3D12Backend.cpp"',
              'Replace-Exact "07_D3D12Backend/D3D12Compilation.cpp"')
            $section = $section.Replace(
              'Replace-RegexSingle "07_D3D12Backend/D3D12Backend.cpp"',
              'Replace-RegexSingle "07_D3D12Backend/D3D12Compilation.cpp"')
            [IO.File]::WriteAllText($scriptPath, $prefix + $section + $suffix)
            "script_sha256=$((Get-FileHash -Algorithm SHA256 $scriptPath).Hash)" | Out-File $diagnostic -Append
            & $scriptPath -RepoRoot $env:GITHUB_WORKSPACE *>> $diagnostic
            "success=true" | Out-File $env:GITHUB_OUTPUT -Append
          }
          catch {
            $_ | Format-List * -Force | Out-File $diagnostic -Append
            "success=false" | Out-File $env:GITHUB_OUTPUT -Append
            exit 1
          }
      - name: Capture partial state
        if: always()
        shell: pwsh
        run: |
          $paths = @(
            "03_RenderIR/RenderIR.h", "03_RenderIR/RenderIR.cpp",
            "04_RenderCompiler/RenderCompiler.h", "04_RenderCompiler/RenderCompiler.cpp",
            "07_D3D12Backend/D3D12Helpers.h", "07_D3D12Backend/D3D12Helpers.cpp",
            "07_D3D12Backend/D3D12BackendInternal.h", "07_D3D12Backend/D3D12Compilation.cpp",
            "07_D3D12Backend/D3D12Backend.cpp", "08_ClassicalRasterFrontend/ClassicalLowering.cpp",
            "09_ExperimentalGeometry/SdfLowering.cpp", "10_Diagnostics/PlanDiagnostics.cpp",
            "11_Tests/CompilerTests.cpp", "11_Tests/D3D12IntegrationTests.cpp",
            "Shaders/IntegrationTemporalRead.hlsl"
          )
          $stage = Join-Path $env:RUNNER_TEMP "partial-state"
          New-Item -ItemType Directory -Path $stage -Force | Out-Null
          foreach ($relative in $paths) {
            $destination = Join-Path $stage $relative
            New-Item -ItemType Directory -Path (Split-Path -Parent $destination) -Force | Out-Null
            Copy-Item -LiteralPath (Join-Path $env:GITHUB_WORKSPACE $relative) -Destination $destination -Force
          }
          Copy-Item -LiteralPath (Join-Path $env:RUNNER_TEMP "apply.ps1") -Destination (Join-Path $stage "apply.ps1") -Force
          Copy-Item -LiteralPath (Join-Path $env:RUNNER_TEMP "apply-diagnostic.txt") -Destination (Join-Path $stage "apply-diagnostic.txt") -Force
          Compress-Archive -Path (Join-Path $stage "*") -DestinationPath (Join-Path $env:RUNNER_TEMP "partial-state.zip") -Force
      - name: Upload partial state
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: partial-state
          path: ${{ runner.temp }}\partial-state.zip
          if-no-files-found: error
          retention-days: 1
      - name: Package changed files
        if: steps.apply.outputs.success == 'true'
        shell: pwsh
        run: |
          $paths = @(
            "03_RenderIR/RenderIR.h", "03_RenderIR/RenderIR.cpp",
            "04_RenderCompiler/RenderCompiler.h", "04_RenderCompiler/RenderCompiler.cpp",
            "07_D3D12Backend/D3D12Helpers.h", "07_D3D12Backend/D3D12Helpers.cpp",
            "07_D3D12Backend/D3D12BackendInternal.h", "07_D3D12Backend/D3D12Compilation.cpp",
            "07_D3D12Backend/D3D12Backend.cpp", "08_ClassicalRasterFrontend/ClassicalLowering.cpp",
            "09_ExperimentalGeometry/SdfLowering.cpp", "10_Diagnostics/PlanDiagnostics.cpp",
            "11_Tests/CompilerTests.cpp", "11_Tests/D3D12IntegrationTests.cpp",
            "Shaders/IntegrationTemporalRead.hlsl"
          )
          $stage = Join-Path $env:RUNNER_TEMP "ProgramInterfaceResourceView_f001aa"
          New-Item -ItemType Directory -Path $stage -Force | Out-Null
          foreach ($relative in $paths) {
            $destination = Join-Path $stage $relative
            New-Item -ItemType Directory -Path (Split-Path -Parent $destination) -Force | Out-Null
            Copy-Item -LiteralPath (Join-Path $env:GITHUB_WORKSPACE $relative) -Destination $destination -Force
          }
          Compress-Archive -Path (Join-Path $stage "*") -DestinationPath (Join-Path $env:RUNNER_TEMP "ProgramInterfaceResourceView_f001aa.zip") -Force
      - name: Upload ZIP
        if: steps.apply.outputs.success == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ProgramInterfaceResourceView_f001aa
          path: ${{ runner.temp }}\ProgramInterfaceResourceView_f001aa.zip
          retention-days: 1
